suite: test binder plugin configuration

set:
  kaiConfigDeployer:
    enabled: false
  kaiConfig:
    render: true
templates:
  - kai-config.yaml
tests:
  - it: should not render binder plugins by default
    asserts:
      - notExists:
          path: spec.binder.plugins

  - it: should render binder plugin overrides
    set:
      binder.plugins.gpusharing.enabled: false
      binder.plugins.volumebinding.arguments.bindTimeoutSeconds: "60"
    asserts:
      - equal:
          path: spec.binder.plugins.gpusharing.enabled
          value: false
      - equal:
          path: spec.binder.plugins.volumebinding.arguments.bindTimeoutSeconds
          value: "60"
