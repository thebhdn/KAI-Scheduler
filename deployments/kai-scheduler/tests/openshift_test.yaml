suite: test openshift mode

templates:
  - rbac/scc.yaml
  - hooks/pre/crd-upgrader.yaml
tests:
  - it: should not render the SCC resources by default (lookup returns nil offline)
    asserts:
      - hasDocuments:
          count: 0
        template: rbac/scc.yaml

  - it: should render the SCC, ClusterRole and ClusterRoleBinding when openshift is set
    set:
      openshift: true
    asserts:
      - hasDocuments:
          count: 3
        template: rbac/scc.yaml
      - isKind:
          of: SecurityContextConstraints
        template: rbac/scc.yaml
        documentIndex: 0
      - isKind:
          of: ClusterRole
        template: rbac/scc.yaml
        documentIndex: 1
      - isKind:
          of: ClusterRoleBinding
        template: rbac/scc.yaml
        documentIndex: 2

  - it: should use the default securityContext in hook pods by default
    asserts:
      - notExists:
          path: spec.template.metadata.annotations["openshift.io/scc"]
        template: hooks/pre/crd-upgrader.yaml
      - notExists:
          path: spec.template.spec.securityContext
        template: hooks/pre/crd-upgrader.yaml

  - it: should use the OpenShift securityContext in hook pods when openshift is set
    set:
      openshift: true
    asserts:
      - equal:
          path: spec.template.metadata.annotations["openshift.io/scc"]
          value: kai-system
        template: hooks/pre/crd-upgrader.yaml
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 10000
        template: hooks/pre/crd-upgrader.yaml
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 10000
        template: hooks/pre/crd-upgrader.yaml
