{{- if .Values.defaultShard.enabled }}
apiVersion: kai.scheduler/v1
kind: SchedulingShard
metadata:
  name: default
  annotations:
    helm.sh/resource-policy: keep
    argocd.argoproj.io/sync-options: Prune=false
spec:
  partitionLabelValue: ""
  {{- if .Values.scheduler.args }}
  args:
    {{- toYaml .Values.scheduler.args | nindent 4 }}
  {{- end }}
  {{- if .Values.scheduler.placementStrategy }}
  placementStrategy:
    gpu: {{ .Values.scheduler.placementStrategy }}
    cpu: {{ .Values.scheduler.placementStrategy }}
  {{- end }}
  {{- if .Values.scheduler.plugins }}
  plugins:
    {{- toYaml .Values.scheduler.plugins | nindent 4 }}
  {{- end }}
  {{- if .Values.scheduler.actions }}
  actions:
    {{- toYaml .Values.scheduler.actions | nindent 4 }}
  {{- end }}
  {{- if .Values.scheduler.scenarioSearchBudgets }}
  scenarioSearchBudgets:
    {{- toYaml .Values.scheduler.scenarioSearchBudgets | nindent 4 }}
  {{- end }}
{{- end }}
