{{- if .Values.kaiConfigDeployer.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: kai-config-deployer
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  template:
    metadata:
      {{- if (include "kai-scheduler.openshift" .) }}
      annotations:
        openshift.io/scc: kai-system
      {{- else }}
      labels:
        app: kai-config-deployer
      {{- end }}
    spec:
      serviceAccountName: kai-config-deployer
      restartPolicy: OnFailure
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- if (include "kai-scheduler.openshift" .) }}
      securityContext:
        runAsUser: 10000
        runAsNonRoot: true
        fsGroup: 10000
      {{- end }}
      {{- if .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.global.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.global.affinity }}
      affinity:
        {{- toYaml .Values.global.affinity | nindent 8 }}
      {{- end }}
      {{- if .Values.global.tolerations }}
      tolerations:
        {{- toYaml .Values.global.tolerations | nindent 8 }}
      {{- end }}
      containers:
      - name: deployer
        image: "{{ .Values.kaiConfigDeployer.image.registry | default .Values.global.registry }}/{{ .Values.kaiConfigDeployer.image.name }}:{{ include "kai-scheduler.imageTag" (dict "root" $ "tag" .Values.kaiConfigDeployer.image.tag) }}"
        imagePullPolicy: {{ .Values.kaiConfigDeployer.image.pullPolicy }}
        {{- with .Values.kaiConfigDeployer.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- if (include "kai-scheduler.openshift" .) }}
        securityContext:
          runAsUser: 10000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        {{- else if .Values.global.securityContext }}
        securityContext:
          {{- toYaml .Values.global.securityContext | nindent 10 }}
        {{- end }}
        command:
        - /bin/bash
        - -c
        args:
        - |
          set -euo pipefail
          # Strip leftover Helm hook annotations from previous chart versions
          # where kai-config was managed as a Helm pre-install,pre-upgrade
          # hook (#1536). No-op when the CR doesn't exist or annotations are
          # already absent.
          kubectl annotate config kai-config \
            helm.sh/hook- helm.sh/hook-weight- 2>/dev/null || true
          kubectl apply --server-side --force-conflicts \
            --field-manager=kai-config-deployer \
            -f /manifest/kai-config.yaml
        volumeMounts:
        - name: manifest
          mountPath: /manifest
      volumes:
      - name: manifest
        configMap:
          name: kai-config-manifest
{{- end }}
