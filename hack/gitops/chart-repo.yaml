# Static in-cluster Helm repository serving the locally-packaged KAI chart to
# the argocd-repo-server. The kai-charts ConfigMap (index.yaml + chart tgz) is
# created by hack/setup-gitops-e2e.sh.
apiVersion: v1
kind: Namespace
metadata:
  name: chart-repo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chart-repo
  namespace: chart-repo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chart-repo
  template:
    metadata:
      labels:
        app: chart-repo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: charts
              mountPath: /usr/share/nginx/html
      volumes:
        - name: charts
          configMap:
            name: kai-charts
---
apiVersion: v1
kind: Service
metadata:
  name: chart-repo
  namespace: chart-repo
spec:
  selector:
    app: chart-repo
  ports:
    - port: 80
      targetPort: 80
