name: Setup E2E Cluster
description: Sets up a Kind cluster with prerequisites for e2e testing

inputs:
  package_version:
    description: Package version for loading images
    required: true
  github_token:
    description: GitHub token for cache operations
    required: false
    default: ''
  k8s_version:
    description: kindest/node image tag (e.g. v1.34.0)
    required: false
    default: 'v1.34.0'
  feature_config:
    description: Named feature configuration (default or dra-enabled)
    required: false
    default: 'default'

runs:
  using: composite
  steps:
    - name: Move Docker Data to /mnt
      shell: bash
      run: |
        sudo systemctl stop docker
        sudo mkdir -p /mnt/docker-data
        echo '{"data-root": "/mnt/docker-data"}' | sudo tee /etc/docker/daemon.json
        sudo systemctl start docker
        docker info | grep "Docker Root Dir"

    - name: Create images directory
      shell: bash
      run: |
        sudo mkdir -p /mnt/images
        sudo chown -R $USER:$USER /mnt/images

    - name: Cache restore
      uses: actions/cache/restore@v5
      with:
        path: /mnt/images
        key: images-${{ github.sha }}

    - name: Generate kind config
      shell: bash
      run: |
        hack/generate-kind-config.sh \
          --feature-config "${{ inputs.feature_config }}" \
          --k8s-version "${{ inputs.k8s_version }}" \
          --output /tmp/kind-config.yaml

    - name: Create k8s Kind Cluster
      uses: helm/kind-action@v1.14.0
      with:
        cluster_name: kind
        version: v0.32.0
        config: /tmp/kind-config.yaml
        node_image: kindest/node:${{ inputs.k8s_version }}

    - name: Deploy image registry
      shell: bash
      run: |
        kubectl apply -f ./hack/local_registry.yaml
        kubectl wait --for=condition=available --timeout=60s deployment/registry -n kube-registry

    - name: Load docker images to registry
      shell: bash
      env:
        PACKAGE_VERSION: ${{ inputs.package_version }}
      run: |
        kubectl port-forward -n kube-registry deploy/registry 5000:5000 &
        docker load < /mnt/images/docker_images.tgz
        for image in $(docker images --format '{{.Repository}}:{{.Tag}}' | grep $PACKAGE_VERSION); do
          new_image=$(echo "$image" | sed -E 's|.*/([^/]+:[^/]+)$|localhost:5000/\1|')
          docker tag $image $new_image
          docker push $new_image
        done

    - name: Deploy fake gpu operator
      shell: bash
      run: |
        DRA_PLUGIN_ENABLED="false"
        if [ "${{ inputs.feature_config }}" = "dra-enabled" ]; then
          DRA_PLUGIN_ENABLED="true"
        fi
        helm upgrade -i gpu-operator oci://ghcr.io/run-ai/fake-gpu-operator/fake-gpu-operator --namespace gpu-operator --create-namespace \
            --version 0.0.74 --values ./hack/fake-gpu-operator-values.yaml --set "draPlugin.enabled=$DRA_PLUGIN_ENABLED" --wait

    - name: Deploy Prometheus Operator
      shell: bash
      run: |
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts --force-update
        helm repo update prometheus-community
        helm install prometheus prometheus-community/kube-prometheus-stack --namespace monitoring --create-namespace \
        --set "alertmanager.enabled=false" \
        --set "grafana.enabled=false" \
        --set "prometheus.enabled=false" \
        --wait

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
        cache: true

    - name: Install ginkgo
      shell: bash
      run: |
        go install github.com/onsi/ginkgo/v2/ginkgo@v2.25.3

    - name: Delete images from disk
      shell: bash
      env:
        PACKAGE_VERSION: ${{ inputs.package_version }}
      run: |
        docker images --format '{{.Repository}}:{{.Tag}}' | grep $PACKAGE_VERSION | xargs docker rmi -f
        sudo rm -rf /mnt/images/docker_images.tgz
