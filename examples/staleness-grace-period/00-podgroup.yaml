apiVersion: v1
kind: Namespace
metadata:
  name: stale-grace-demo
---
apiVersion: scheduling.run.ai/v2alpha2
kind: PodGroup
metadata:
  name: stale-gang
  namespace: stale-grace-demo
  labels:
    kai.scheduler/queue: default-queue
spec:
  queue: default-queue
  minMember: 2
  stalenessGracePeriod: 30s
