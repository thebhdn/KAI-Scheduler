apiVersion: v1
kind: Pod
metadata:
  name: stale-gang-pod-0
  namespace: stale-grace-demo
  labels:
    kai.scheduler/queue: default-queue
  annotations:
    pod-group-name: stale-gang
spec:
  schedulerName: kai-scheduler
  containers:
    - name: main
      image: registry.k8s.io/pause:3.9
      resources:
        requests: { cpu: 100m, memory: 64Mi }
        limits: { cpu: 100m, memory: 64Mi }
---
